<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrations — Hantrix Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --orange:#f7941d; --bg:#f5f5f5; --text:#111; --muted:rgba(0,0,0,.55); --line:rgba(0,0,0,.1); --green:#1a9d54; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:"Plus Jakarta Sans",sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
    .wrap { max-width:1000px; margin:0 auto; padding:24px 18px 60px; }
    .top { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
    .top h1 { font-size:22px; font-weight:700; }
    .top .right { display:flex; gap:8px; }
    .btn { border:none; cursor:pointer; font-family:inherit; font-weight:600; font-size:14px; border-radius:10px; padding:10px 16px; background:#fff; color:#111; border:1px solid var(--line); }
    .btn-primary { background:var(--orange); color:#fff; border-color:transparent; }
    .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px; }
    .stat { background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; }
    .stat .n { font-size:28px; font-weight:800; }
    .stat .l { font-size:12.5px; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }
    .stat.green .n { color:var(--green); }
    .stat.orange .n { color:var(--orange); }
    .search { width:100%; padding:12px 14px; font-size:15px; border:1px solid var(--line); border-radius:12px; outline:none; margin-bottom:14px; background:#fff; font-family:inherit; }
    .search:focus { border-color:var(--orange); }
    .tablewrap { background:#fff; border:1px solid var(--line); border-radius:14px; overflow:auto; }
    table { width:100%; border-collapse:collapse; font-size:13.5px; min-width:640px; }
    th, td { text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); white-space:nowrap; }
    th { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); background:#fafafa; position:sticky; top:0; }
    tr:last-child td { border-bottom:none; }
    td.name { font-weight:600; white-space:normal; }
    .pill { display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
    .pill.in { background:#e6f6ee; color:var(--green); }
    .pill.no { background:#f0f0f0; color:#888; }
    .pill.unpaid { background:#fdecec; color:#e11d48; }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tab { border:1px solid var(--line); background:#fff; color:var(--muted); font-family:inherit; font-weight:600; font-size:13.5px; padding:9px 14px; border-radius:10px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
    .tab.active { background:#111; color:#fff; border-color:#111; }
    .tab .badge { background:rgba(0,0,0,.12); border-radius:20px; padding:1px 8px; font-size:12px; }
    .tab.active .badge { background:rgba(255,255,255,.25); }
    .empty { padding:40px; text-align:center; color:var(--muted); }
    .lnk { border:none; background:none; cursor:pointer; font-family:inherit; font-size:12.5px; font-weight:600; padding:4px 6px; border-radius:6px; }
    .lnk.edit { color:var(--orange); }
    .lnk.del { color:#e11d48; }
    .lnk:hover { background:rgba(0,0,0,.05); }
    .rowc { cursor:pointer; }
    .rowc:hover td { background:#faf7f2; }
    .notecell { white-space:normal; width:260px; max-width:260px; color:#555; font-size:13px; line-height:1.4; overflow-wrap:anywhere; word-break:break-word; }
    .notecell:empty::after { content:'—'; color:#ccc; }
    .drow { display:flex; justify-content:space-between; gap:14px; font-size:14px; padding:9px 0; border-bottom:1px solid var(--line); }
    .drow .dk { color:var(--muted); flex-shrink:0; }
    .drow .dv { font-weight:600; text-align:right; word-break:break-word; }
    .modal textarea { width:100%; padding:10px 12px; font-size:14px; border:1px solid var(--line); border-radius:10px; outline:none; font-family:inherit; resize:vertical; }
    .modal textarea:focus { border-color:var(--orange); }
    .save-hint { font-size:11.5px; color:var(--muted); }
    /* modal */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; padding:20px; z-index:20; }
    .modal.show { display:flex; }
    .modal .box { background:#fff; border-radius:16px; padding:22px; width:400px; max-width:100%; display:flex; flex-direction:column; gap:12px; }
    .modal h3 { font-size:17px; font-weight:700; }
    .modal label { font-size:12px; font-weight:600; color:var(--muted); margin-bottom:4px; display:block; }
    .modal input, .modal select { width:100%; padding:10px 12px; font-size:14px; border:1px solid var(--line); border-radius:10px; outline:none; font-family:inherit; background:#fff; }
    .modal input:focus, .modal select:focus { border-color:var(--orange); }
    .modal .foot { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top:6px; }
    .modal .foot .right { display:flex; gap:8px; }
    /* gate */
    .gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px; z-index:10; }
    .gate .box { background:#fff; border:1px solid var(--line); border-radius:18px; padding:28px; width:360px; max-width:100%; display:flex; flex-direction:column; gap:14px; text-align:center; }
    .gate h2 { font-size:20px; font-weight:700; }
    .gate input { padding:12px 14px; font-size:15px; border:1px solid var(--line); border-radius:12px; outline:none; font-family:inherit; }
    .gate .err { color:#e11d48; font-size:13px; display:none; }
    @media (max-width:560px){ .cards{ grid-template-columns:repeat(3,1fr);} .stat .n{font-size:20px;} .stat .l{font-size:10px;} }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="box">
      <h2>Admin Access</h2>
      <input id="pw" type="password" placeholder="Enter admin password" />
      <div class="err" id="gateErr">Wrong password.</div>
      <button class="btn btn-primary" id="gateBtn">Unlock</button>
    </div>
  </div>

  <div class="wrap" id="app" style="display:none;">
    <div class="top">
      <h1>Event Registrations</h1>
      <div class="right">
        <button class="btn btn-primary" id="addBtn">+ Add attendee</button>
        <button class="btn" id="refresh">Refresh</button>
        <button class="btn" id="csv">Export CSV</button>
        <button class="btn" id="logout">Log out</button>
      </div>
    </div>
    <div class="cards">
      <div class="stat"><div class="n" id="cTotal">—</div><div class="l">Paid</div></div>
      <div class="stat green"><div class="n" id="cIn">—</div><div class="l">Checked in</div></div>
      <div class="stat orange"><div class="n" id="cRev">—</div><div class="l">Revenue ₹</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="paid">Paid <span class="badge" id="tPaid">0</span></button>
      <button class="tab" data-tab="pending">Not paid <span class="badge" id="tPending">0</span></button>
    </div>
    <input class="search" id="search" placeholder="Search name, phone or email…" />
    <div class="tablewrap">
      <table>
        <thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Amount</th><th>Payment</th><th>Check-in</th><th>Registered</th><th>Notes</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none;">No registrations yet.</div>
    </div>
  </div>

  <div class="modal" id="detailModal">
    <div class="box">
      <h3 id="dName">—</h3>
      <div id="dPills" style="display:flex; gap:8px; margin:-4px 0 6px;"></div>
      <div class="drow"><span class="dk">Phone</span><span class="dv" id="dPhone"></span></div>
      <div class="drow"><span class="dk">Email</span><span class="dv" id="dEmail"></span></div>
      <div class="drow"><span class="dk">Amount</span><span class="dv" id="dAmount"></span></div>
      <div class="drow"><span class="dk">Registered</span><span class="dv" id="dDate"></span></div>
      <div class="drow"><span class="dk">Booking ID</span><span class="dv" id="dOid" style="font-size:11px; color:#999; font-weight:400;"></span></div>
      <div style="margin-top:6px;">
        <label>Notes <span class="save-hint">(saves automatically)</span></label>
        <textarea id="dNotes" rows="3" placeholder="Add a note — e.g. called, will pay tomorrow…"></textarea>
      </div>
      <div class="foot">
        <button class="lnk del" id="dDelete" style="color:#e11d48; font-size:13.5px;">Delete</button>
        <div class="right">
          <button class="btn" id="dEdit">Edit details</button>
          <button class="btn btn-primary" id="dClose">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="addModal">
    <div class="box">
      <h3>Add attendee</h3>
      <div><label>Status</label>
        <select id="aStatus">
          <option value="PAID">Paid — send QR ticket by email</option>
          <option value="PENDING">Not paid — just add to the list</option>
        </select>
      </div>
      <div><label>Full name</label><input id="aName" type="text" placeholder="Full name" /></div>
      <div><label>Phone</label><input id="aPhone" type="text" placeholder="10-digit number" /></div>
      <div><label>Email</label><input id="aEmail" type="email" placeholder="email (QR sent here if Paid)" /></div>
      <div><label>Amount (₹)</label><input id="aAmount" type="number" value="999" /></div>
      <div class="foot">
        <div></div>
        <div class="right">
          <button class="btn" id="aCancel">Cancel</button>
          <button class="btn btn-primary" id="aSave">Add attendee</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="box">
      <h3>Edit registration</h3>
      <div><label>Full name</label><input id="eName" type="text" /></div>
      <div><label>Phone</label><input id="ePhone" type="text" /></div>
      <div><label>Email</label><input id="eEmail" type="email" /></div>
      <div class="foot">
        <button class="lnk" id="eReset" style="color:#8a6d1a;display:none;">↺ Reset check-in</button>
        <div class="right">
          <button class="btn" id="eCancel">Cancel</button>
          <button class="btn btn-primary" id="eSave">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var WORKER_URL = 'https://cashfree-webinar.hantrixacademy.workers.dev';
    var token = localStorage.getItem('hntx_admin') || '';
    var ALL = [];

    function api(path) {
      return fetch(WORKER_URL + path, { headers: { 'x-admin-token': token } });
    }
    function fmtDate(s) { if(!s) return '—'; var d=new Date(s); return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}); }
    function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    function render(list) {
      var rows = document.getElementById('rows');
      document.getElementById('empty').style.display = list.length ? 'none' : 'block';
      rows.innerHTML = list.map(function (r) {
        var payPill = r.status === 'PAID'
          ? '<span class="pill in">Paid</span>'
          : '<span class="pill unpaid">Not paid</span>';
        var checkPill = r.status === 'PAID'
          ? (r.checked_in ? '<span class="pill in">✓ Arrived</span>' : '<span class="pill no">Not yet</span>')
          : '<span style="color:#bbb;">—</span>';
        return '<tr class="rowc" data-oid="'+esc(r.order_id)+'"><td class="name">'+esc(r.name)+'</td><td>'+esc(r.phone)+'</td><td>'+esc(r.email)+'</td><td>₹'+(r.amount||0)+'</td><td>'+payPill+'</td><td>'+checkPill+'</td><td>'+fmtDate(r.created_at)+'</td><td class="notecell">'+esc(r.notes||'')+'</td></tr>';
      }).join('');
      [].forEach.call(rows.querySelectorAll('.rowc'), function(tr){ tr.addEventListener('click', function(){ openDetails(tr.getAttribute('data-oid')); }); });
    }

    function apiPost(path, body) {
      return fetch(WORKER_URL + path, { method:'POST', headers:{ 'Content-Type':'application/json', 'x-admin-token': token }, body: JSON.stringify(body) });
    }

    var editingId = null;
    function openEdit(oid) {
      var r = ALL.find(function(x){ return x.order_id === oid; });
      if (!r) return;
      editingId = oid;
      document.getElementById('eName').value = r.name || '';
      document.getElementById('ePhone').value = r.phone || '';
      document.getElementById('eEmail').value = r.email || '';
      document.getElementById('eReset').style.display = r.checked_in ? 'inline-block' : 'none';
      document.getElementById('editModal').classList.add('show');
    }
    function closeEdit(){ document.getElementById('editModal').classList.remove('show'); editingId = null; }

    document.getElementById('eCancel').addEventListener('click', closeEdit);
    document.getElementById('editModal').addEventListener('click', function(e){ if(e.target.id==='editModal') closeEdit(); });
    document.getElementById('eSave').addEventListener('click', function(){
      if (!editingId) return;
      apiPost('/admin/update', {
        order_id: editingId,
        name: document.getElementById('eName').value.trim(),
        phone: document.getElementById('ePhone').value.trim(),
        email: document.getElementById('eEmail').value.trim(),
      }).then(function(){ closeEdit(); load(); });
    });
    document.getElementById('eReset').addEventListener('click', function(){
      if (!editingId) return;
      if (!confirm('Reset this person’s check-in so they can be scanned again?')) return;
      apiPost('/admin/uncheckin', { order_id: editingId }).then(function(){ closeEdit(); load(); });
    });
    function doDelete(oid) {
      var r = ALL.find(function(x){ return x.order_id === oid; });
      if (!confirm('Delete registration for "' + (r ? r.name : oid) + '"? This cannot be undone.')) return;
      apiPost('/admin/delete', { order_id: oid }).then(function(){ load(); });
    }

    // details popup (click a row)
    var detailId = null;
    function openDetails(oid) {
      var r = ALL.find(function(x){ return x.order_id === oid; });
      if (!r) return;
      detailId = oid;
      document.getElementById('dName').textContent = r.name || '(no name)';
      var payPill = r.status === 'PAID' ? '<span class="pill in">Paid</span>' : '<span class="pill unpaid">Not paid</span>';
      var checkPill = r.status === 'PAID' ? (r.checked_in ? '<span class="pill in">✓ Arrived</span>' : '<span class="pill no">Not yet</span>') : '';
      document.getElementById('dPills').innerHTML = payPill + checkPill;
      document.getElementById('dPhone').textContent = r.phone || '—';
      document.getElementById('dEmail').textContent = r.email || '—';
      document.getElementById('dAmount').textContent = '₹' + (r.amount || 0);
      document.getElementById('dDate').textContent = fmtDate(r.created_at);
      document.getElementById('dOid').textContent = r.order_id;
      document.getElementById('dNotes').value = r.notes || '';
      document.getElementById('detailModal').classList.add('show');
    }
    function closeDetails(){ document.getElementById('detailModal').classList.remove('show'); detailId = null; }
    document.getElementById('dClose').addEventListener('click', closeDetails);
    document.getElementById('detailModal').addEventListener('click', function(e){ if(e.target.id==='detailModal') closeDetails(); });
    document.getElementById('dNotes').addEventListener('change', function(){
      if (!detailId) return;
      var rec = ALL.find(function(x){ return x.order_id === detailId; });
      if (rec) rec.notes = document.getElementById('dNotes').value;   // keep client state + row dot in sync
      apiPost('/admin/note', { order_id: detailId, notes: document.getElementById('dNotes').value });
    });
    document.getElementById('dEdit').addEventListener('click', function(){ var oid = detailId; closeDetails(); openEdit(oid); });
    document.getElementById('dDelete').addEventListener('click', function(){ var oid = detailId; closeDetails(); doDelete(oid); });

    // add attendee (manual / paid via another channel)
    document.getElementById('addBtn').addEventListener('click', function(){
      document.getElementById('aStatus').value='PAID';
      document.getElementById('aName').value=''; document.getElementById('aPhone').value='';
      document.getElementById('aEmail').value=''; document.getElementById('aAmount').value='999';
      document.getElementById('addModal').classList.add('show');
    });
    document.getElementById('aCancel').addEventListener('click', function(){ document.getElementById('addModal').classList.remove('show'); });
    document.getElementById('addModal').addEventListener('click', function(e){ if(e.target.id==='addModal') document.getElementById('addModal').classList.remove('show'); });
    document.getElementById('aSave').addEventListener('click', function(){
      var name = document.getElementById('aName').value.trim();
      if (name.length < 2) { alert('Please enter a name.'); return; }
      var btn = document.getElementById('aSave'); btn.disabled = true; btn.textContent = 'Adding…';
      apiPost('/admin/add', {
        name: name,
        phone: document.getElementById('aPhone').value.trim(),
        email: document.getElementById('aEmail').value.trim(),
        amount: parseInt(document.getElementById('aAmount').value, 10) || 999,
        status: document.getElementById('aStatus').value,
      }).then(function(r){ return r.json(); }).then(function(){
        document.getElementById('addModal').classList.remove('show');
        btn.disabled = false; btn.textContent = 'Add attendee'; load();
      }).catch(function(){ btn.disabled = false; btn.textContent = 'Add attendee'; });
    });

    function load() {
      api('/admin/list').then(function (r) {
        if (r.status === 401) return gateFail();
        return r.json();
      }).then(function (d) {
        if (!d) return;
        ALL = d.registrations || [];
        document.getElementById('cTotal').textContent = d.paid || 0;
        document.getElementById('cIn').textContent = d.checkedIn || 0;
        document.getElementById('cRev').textContent = (d.revenue || 0).toLocaleString('en-IN');
        document.getElementById('tPaid').textContent = d.paid || 0;
        document.getElementById('tPending').textContent = d.pending || 0;
        applySearch();
        showApp();
      }).catch(function(){ gateFail(); });
    }

    var activeTab = 'paid';
    function applySearch() {
      var q = document.getElementById('search').value.trim().toLowerCase();
      var list = ALL.filter(function(r){ return activeTab === 'paid' ? r.status === 'PAID' : r.status !== 'PAID'; });
      if (q) list = list.filter(function(r){
        return (r.name||'').toLowerCase().indexOf(q)>=0 || (r.phone||'').indexOf(q)>=0 || (r.email||'').toLowerCase().indexOf(q)>=0;
      });
      render(list);
    }
    [].forEach.call(document.querySelectorAll('.tab'), function(t){
      t.addEventListener('click', function(){
        document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
        t.classList.add('active'); activeTab = t.getAttribute('data-tab'); applySearch();
      });
    });

    function exportCSV() {
      var head = ['Name','Phone','Email','Amount','Status','CheckedIn','CheckedInAt','Registered','Notes'];
      var lines = [head.join(',')].concat(ALL.map(function(r){
        return [r.name,r.phone,r.email,r.amount,r.status,r.checked_in?'Yes':'No',r.checked_in_at||'',r.created_at,r.notes||''].map(function(v){
          v = (v==null?'':String(v)); return '"'+v.replace(/"/g,'""')+'"';
        }).join(',');
      }));
      var blob = new Blob([lines.join('\n')], {type:'text/csv'});
      var a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='hantrix-registrations.csv'; a.click();
    }

    function showApp(){ document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='block'; }
    function gateFail(){ localStorage.removeItem('hntx_admin'); token=''; document.getElementById('gate').style.display='flex'; document.getElementById('app').style.display='none'; document.getElementById('gateErr').style.display='block'; }

    document.getElementById('gateBtn').addEventListener('click', function(){
      token = document.getElementById('pw').value.trim();
      localStorage.setItem('hntx_admin', token);
      document.getElementById('gateErr').style.display='none';
      load();
    });
    document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('gateBtn').click(); });
    document.getElementById('search').addEventListener('input', applySearch);
    document.getElementById('refresh').addEventListener('click', load);
    document.getElementById('csv').addEventListener('click', exportCSV);
    document.getElementById('logout').addEventListener('click', gateFail);

    if (token) load(); // try stored password
  </script>
</body>
</html>
